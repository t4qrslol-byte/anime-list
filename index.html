<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Anime & Manga Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(rgba(18, 12, 28, 0.88), rgba(28, 16, 42, 0.95)), 
                        url('https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=1200&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #eae1f0;
        }
        /* Custom scrollbar matching sakura palette */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 11, 25, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: #ffb7c5;
            border-radius: 4px;
        }
        /* Frosted glass cards layout */
        .glass-panel {
            background: rgba(28, 18, 42, 0.7);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 183, 197, 0.15);
        }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col tracking-wide">

    <header class="border-b border-pink-900/30 bg-[#191129]/80 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl animate-pulse">🌸</span>
                <h1 class="text-2xl font-extrabold tracking-widest bg-gradient-to-r from-pink-300 via-purple-300 to-indigo-300 bg-clip-text text-transparent">
                    SAKURA VAULT
                </h1>
            </div>
            <nav class="flex gap-2 bg-[#0e0a17]/95 p-1.5 rounded-xl border border-pink-950/40">
                <button onclick="switchTab('anime')" id="tab-anime" class="tab-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all bg-gradient-to-r from-pink-400 to-purple-500 text-white shadow-md shadow-pink-950/40">
                    Anime (<span id="count-anime">0</span>)
                </button>
                <button onclick="switchTab('manga')" id="tab-manga" class="tab-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all text-purple-300 hover:text-white">
                    Manga (<span id="count-manga">0</span>)
                </button>
                <button onclick="switchTab('watchlist')" id="tab-watchlist" class="tab-btn px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider transition-all text-purple-300 hover:text-white">
                    Watchlist (<span id="count-watchlist">0</span>)
                </button>
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-8">
        
        <section id="content-anime" class="tab-content">
            <div class="flex items-center gap-2 mb-6">
                <i class="fa-solid fa-compact-disc text-pink-400 animate-spin" style="animation-duration: 8s;"></i>
                <h2 class="text-xl font-semibold text-pink-200">Collected Tapes</h2>
            </div>
            <div id="anime-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                </div>
        </section>

        <section id="content-manga" class="tab-content hidden">
            <div class="flex items-center gap-2 mb-6">
                <i class="fa-solid fa-book-open text-purple-400"></i>
                <h2 class="text-xl font-semibold text-purple-200">Shelf Library</h2>
            </div>
            <div id="manga-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                </div>
        </section>

        <section id="content-watchlist" class="tab-content hidden">
            <div class="flex items-center gap-2 mb-6">
                <i class="fa-regular fa-heart text-indigo-400 animate-pulse"></i>
                <h2 class="text-xl font-semibold text-indigo-200">Future Late Nights</h2>
            </div>
            <div id="watchlist-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                </div>
        </section>
    </main>

    <footer class="border-t border-pink-950/20 bg-[#0e0a17]/90 py-6 text-center text-xs text-purple-400/60 tracking-widest">
        <p>• LO-FI ANIME ARCHIVE v3.0 • ☕ TAP ANY ENTRY TO SEARCH ON MAL •</p>
    </footer>

    <script>
        // Media lists (Cyberpunk updated to Anime category)
        const animeList = [
            "Pokémon", "Yo-Kai Watch", "Beyblade", "Demon Slayer", "Shimoneta", "My Dress-Up Darling", 
            "Highschool DxD", "In Another World w/m Smartphone", "Yamada-Kun and the Seven Witches", 
            "That Time I Got Reincarnated as a Slime", "Death Note", "KonoSuba", "JUJUTSU KAISEN", 
            "Romantic Killer", "Toradora!", "My Love Story With Yamada-kun at Lv999", 
            "KonoSuba: An Explosion on This Wonderful World!", "Sword Art Online", "Kaguya Sama: Love is War!", 
            "Solo Leveling", "Horimiya", "Classroom of the Elite", "TSUKIMICHI: Moonlit Fantasy", 
            "DARLING in the FRANXX", "MASHLE: MAGIC AND MUSCLES", "Domestic Girlfriend", 
            "Alya Sometimes Hides Her Feelings In Russian (#3)", "JoJo’s Bizzare Adventure", "School Days", 
            "Saiki K.", "Naruto/Shippuden", "Don’t Toy With Me Miss Nagatoro", "WIND BREAKER (awesome new anime)", 
            "Rascal Does Not Dream of Bunny Girl Senpai", "Kaiju No. 8", "Tower of God", "CHAINSAW MAN", 
            "Tokyo Ghoul", "(PEAK) Can a Boy-Girl Friendship Survive?", "BOCCHI THE ROCK!", 
            "Makeine: Too Many Losing Heroines", "Tomo-chan is a Girl!", "A Couple of Cuckoos", 
            "The Quintessential Quintuplets (#1)", "More Than a Married Couple, But Not Lovers (peak)", 
            "The Angel Next Door Spoils Me Rotten", "Date a Live (#3)", "Clevatess (good new anime)", 
            "The Fragrant Flower Blooms With Dignity", "One Punch Man", "Reign of the Seven Spellblades", 
            "Tougen Anki", "Hokkaido Gals Are Super Adorable", "Sakamoto Days", "Frieren (#1)", 
            "Cosmic Princess Kaguya", "Hana-kimi", "You can never be in a romcom with your childhood friends!", 
            "Call of the Night (#3)", "Black Clover", "The ice guy and his cool female colleague (#2)", 
            "Pseudo-Harem (#1)", "My Awkward Senpai (#3)", "Tune In to the Midnight Heart (#3)", 
            "Uzaki-chan Wants to Hang Out! (#1)", "Cyberpunk Edgerunners (#1)"
        ];

        const mangaList = [
            "I’m in Love with the Older Girl Next Door", "Haimiya-senpai is cute and scary (#1)", 
            "I made friends with the second prettiest girl in class (#1)", "Black Clover (#2)", 
            "The ice guy and his cool female colleague (#2)", "Can’t Gals Be Kind to Otaku? (#2)", 
            "The Case Study of Vanitas (#3)", "Uzaki-chan Wants to Hang Out! (#1)"
        ];

        const watchList = [
            "Finish Wandance", "Boarding School Juliet", "Blue Box", "I have a crush at work", 
            "Blue Spring Ride", "Kagurabachi", "Azumanga Daioh", "Dealing With Mikadono Sisters is a Breeze", 
            "Chained Soldier", "Red River", "Akame ga Kill", "Oshi no Ko", "Finish gurren lagann", 
            "No Game No Life", "Lord of Mysteries", "Love is Hard for Otaku", "Golden Time", 
            "Hajame no ippo", "FINISH DARLING IN THE FRANXX", "Future Diary", "Your Lie in April", 
            "Plastic Memories", "PERSONA5", "Bakemonogatari", "I Want to Eat Your Pancreas", 
            "Danganronpa", "My youth romantic comedy is wrong as I expected SNAFU", "Attack on Titan", 
            "Giji Harem", "Kakegurui", "Evangelion", "Mushoku Tensei: Jobless Reincarnation", 
            "Code Geass", "STEINS;GATE"
        ];

        function parseTitle(itemString) {
            let cleanTitle = itemString;
            let rank = null;
            let isPeak = false;
            let customTag = null;

            const rankMatch = itemString.match(/\(#(\d+)\)/);
            if (rankMatch) { rank = rankMatch[1]; cleanTitle = cleanTitle.replace(rankMatch[0], ''); }
            if (itemString.toLowerCase().includes('peak')) { isPeak = true; cleanTitle = cleanTitle.replace(/\([Pp][Ee][Aa][Kk]\)/g, '').replace(/\(peak\)/g, ''); }
            const tagMatch = cleanTitle.match(/\(([^)]+)\)/);
            if (tagMatch && !tagMatch[0].includes('#')) { customTag = tagMatch[1]; cleanTitle = cleanTitle.replace(tagMatch[0], ''); }

            return { title: cleanTitle.trim(), rank: rank, isPeak: isPeak, tag: customTag };
        }

        // Generates an elegant, lightweight aesthetic abstract cover block directly using browser CSS styles
        function getBackgroundStyle(title) {
            let hash = 0;
            for (let i = 0; i < title.length; i++) { hash = title.charCodeAt(i) + ((hash << 5) - hash); }
            const hue = Math.abs(hash % 360);
            return `linear-gradient(135deg, hsl(${hue}, 45%, 28%), hsl(${(hue + 60) % 360}, 40%, 15%))`;
        }

        function createMediaCard(item, type) {
            const data = parseTitle(item);
            const style = getBackgroundStyle(data.title);
            const url = `https://myanimelist.net/${type}.php?q=${encodeURIComponent(data.title)}`;
            
            let badges = '';
            if (data.rank) {
                let badgeColor = data.rank === '1' ? 'from-amber-300 to-yellow-400 text-purple-950' : 
                                 data.rank === '2' ? 'from-slate-200 to-slate-400 text-purple-950' : 
                                 'from-amber-600 to-orange-500 text-white';
                badges = `<span class="bg-gradient-to-r ${badgeColor} text-[9px] font-black px-1.5 py-0.5 rounded shadow">#${data.rank}</span>`;
            }
            if (data.isPeak) {
                badges += `<span class="bg-gradient-to-r from-rose-500 to-red-600 text-white text-[9px] font-black px-1.5 py-0.5 rounded shadow">PEAK</span>`;
            }

            return `
                <a href="${url}" target="_blank" rel="noopener noreferrer" class="glass-panel rounded-xl overflow-hidden shadow-lg transition-all duration-300 hover:-translate-y-1 group flex flex-col h-full">
                    <div class="aspect-[3/4] w-full flex flex-col justify-between p-3 relative" style="background: ${style};">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#161026] via-transparent to-black/10 pointer-events-none"></div>
                        <div class="z-10 flex flex-wrap gap-1">${badges}</div>
                        <div class="z-10 w-full flex justify-between items-end opacity-40 group-hover:opacity-100 transition-opacity">
                            <span class="text-[8px] font-mono tracking-widest text-pink-200">MAL DATA ↗</span>
                            <i class="fa-solid fa-arrow-up-right-from-square text-[9px] text-pink-300"></i>
                        </div>
                    </div>
                    <div class="p-3 bg-[#150f24]/95 flex-grow flex flex-col justify-between border-t border-pink-950/20">
                        <h3 class="font-bold text-xs text-pink-100 group-hover:text-pink-300 transition-colors line-clamp-2">${data.title}</h3>
                        ${data.tag ? `<p class="text-[9px] italic text-purple-300/70 mt-1 truncate">~ ${data.tag}</p>` : ''}
                    </div>
                </a>
            `;
        }

        function initDashboard() {
            document.getElementById('count-anime').innerText = animeList.length;
            document.getElementById('count-manga').innerText = mangaList.length;
            document.getElementById('count-watchlist').innerText = watchList.length;

            const sortedAnime = [...animeList].sort();
            const sortedManga = [...mangaList].sort();
            const sortedWatch = [...watchList].sort();

            document.getElementById('anime-grid').innerHTML = sortedAnime.map(item => createMediaCard(item, 'anime')).join('');
            document.getElementById('manga-grid').innerHTML = sortedManga.map(item => createMediaCard(item, 'manga')).join('');

            document.getElementById('watchlist-grid').innerHTML = sortedWatch.map(item => {
                const data = parseTitle(item);
                const url = `https://myanimelist.net/anime.php?q=${encodeURIComponent(data.title)}`;
                return `
                    <a href="${url}" target="_blank" rel="noopener noreferrer" class="glass-panel rounded-xl p-3 flex items-center justify-between border border-purple-900/20 hover:border-indigo-400/40 transition-all group">
                        <span class="text-xs font-medium text-purple-200 group-hover:text-indigo-200 truncate pr-2">${data.title}</span>
                        <span class="text-[9px] uppercase tracking-wider font-bold text-indigo-300 bg-indigo-950/60 border border-indigo-800/40 px-2 py-0.5 rounded flex items-center gap-1 shrink-0">
                            <i class="fa-solid fa-moon text-[8px]"></i> Queue
                        </span>
                    </a>
                `;
            }).join('');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`content-${tabName}`).classList.remove('hidden');

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-gradient-to-r', 'from-pink-400', 'to-purple-500', 'text-white', 'shadow-md', 'shadow-pink-950/40');
                btn.classList.add('text-purple-300', 'hover:text-white');
            });
            
            const activeBtn = document.getElementById(`tab-${tabName}`);
            activeBtn.classList.add('bg-gradient-to-r', 'from-pink-400', 'to-purple-500', 'text-white', 'shadow-md', 'shadow-pink-950/40');
            activeBtn.classList.remove('text-purple-300', 'hover:text-white');
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
